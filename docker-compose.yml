version: "3.9"

services:
  # ── MySQL ────────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: career_platform
      MYSQL_USER: career_user
      MYSQL_PASSWORD: career_password
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "career_user", "-pcareer_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Django Backend ────────────────────────────────────────��──────────────────
  django:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: final
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "python manage.py migrate --fake-initial 2>/dev/null; python manage.py migrate --run-syncdb 2>/dev/null; python manage.py collectstatic --noinput; gunicorn career_platform.asgi:application --worker-class uvicorn.workers.UvicornWorker --workers 4 --bind 0.0.0.0:8000 --timeout 120"
    expose:
      - "8000"

  # ── Celery Worker ────────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: final
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - media_data:/app/media
    depends_on:
      - django
      - redis
      - mysql
    command: celery -A career_platform worker --loglevel=info --concurrency=4

  # ── Celery Beat ──────────────────────────────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: final
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - django
      - redis
      - mysql
    command: celery -A career_platform beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ── Flower (Celery Monitor) ──────────────────────────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: final
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    command: celery -A career_platform flower --port=5555
    ports:
      - "5555:5555"

  # ── FastAPI AI Microservice ──────────────────────────────────────────────────
  fastapi:
    build:
      context: ./fastapi_service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PORT=8001
    expose:
      - "8001"

  # ── React Frontend ───────────────────────────────────────────────────────────
  react:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=/api
      - VITE_WS_URL=ws://localhost/ws
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_data:/var/www/static:ro
      - media_data:/var/www/media:ro
    ports:
      - "80:80"
    depends_on:
      - django
      - react

volumes:
  mysql_data:
  redis_data:
  media_data:
  static_data: